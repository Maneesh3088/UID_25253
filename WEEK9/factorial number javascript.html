<!DOCTYPE html>
<html>
  <head>
  <title>Factorial Number</title>
  <style>
  body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
    background-color:lightgreen;
  }
  input {
    padding: 8px;
    font-size: 16px;
    border: 2px black solid;
    border-radius: 5px;
  }
  button {
    padding: 8px 15px;
    font-size: 16px;
    background-color: blue;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: darkblue;
  }
 .box {
    border: 2px solid black;
    display: inline-block;
    padding: 30px;
    border-radius: 20px;
    background-color: white;
    }
 </style>
 </head>
 <body>
 <div class="box">
 <h1>Calculate Factorial of a Number</h1>
 <input type="text" id="num" placeholder="Enter number">
 <br><br>
 <b><h2><p id="result"></p></h2></b>
 <button onclick="check()">Check</button>
<script>
function check() {
    let n = document.getElementById("num").value;
    let k = 1;
    for (let i = 1; i <= n; i++) {
        k = k * i;
    }
    document.getElementById("result").innerHTML = "Factorial is " + k;
}
</script>
</body>
</html>
