<!DOCTYPE html>
<html>
  <head>
  <title>Odd or Even Number</title>
<style>
  body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
    background-color: lightgreen;
  }
  input {
    padding: 8px;
    font-size: 16px;
    border: 2px black solid;
    border-radius: 5px;
  }
  button {
    padding: 8px 15px;
    font-size: 16px;
    background-color: blue;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: darkblue;
  }
  .box {
    border: 2px solid black;
    display: inline-block;
    padding: 30px;
    border-radius: 20px;
    background-color: white;
  }
</style>
</head>
<body>
 <div class="box">
 <h1>Check if a number is Odd or Even</h1>
 <input type="text" id="num" placeholder="Enter number">
 <br><br>
 <b><h2><p id="result"></p></h2></b>
 <button onclick="check()">Check</button>
<script>
function check() {
    let a = document.getElementById("num").value;
    if (a % 2 == 0) {
        document.getElementById("result").innerHTML = a + " is Even Number";
    } else {
        document.getElementById("result").innerHTML = a + " is Odd Number";
    }
}
</script>
</body>
</html>
