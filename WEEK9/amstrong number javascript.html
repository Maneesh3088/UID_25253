<!DOCTYPE html>
<html>
  <head>
  <title>Armstrong Number</title>
  <style>
  body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
    background-color:lightgreen;
  }
  input {
    padding: 8px;
    font-size: 16px;
    border: 2px black solid;
    border-radius: 5px;
  }
  button {
    padding: 8px 15px;
    font-size: 16px;
    background-color: blue;
    color: white;
    border: none;
    border-radius:5px;
    cursor: pointer;
  }
  button:hover {
    background-color: darkblue;
  }
  .box {
    border: 2px solid black;
    display: inline-block;
    padding: 30px;
    border-radius: 20px;
    background-color: white;
  }
 </style>
 </head>
 <body>
 <div class="box">
 <h1>Check if a number is Amstrong or Not</h1>
 <input type="text" id="num" placeholder="Enter number">
 <br><br>
 <b><h2><p id="result"></p></h2></b>
 <button onclick="check()">Check</button> 
<script>
function check() {
    let n = document.getElementById("num").value;
    let k = n;
    let s = 0;
    while (n > 0) {
        let r = n % 10;
        s = s + r*r*r;
        n = Math.floor(n / 10);
    }
    if (s == k)
        document.getElementById("result").innerHTML = k + " is Armstrong";
    else
        document.getElementById("result").innerHTML = k + " is Not Armstrong";
}
</script>
 </body>
</html>
