<!DOCTYPE html>
<html>
<head>
    <title>Password Validation</title>
</head>
<body>
<h2>Password Validation</h2>
Password: <input type="text" id="pass" onkeyup="checkPassword()"><br><br>
<p id="msg"></p>
<script>
let pattern = /^(?=.*[a-zA-Z])(?=.*[0-9]).{8,}$/;
function checkPassword() {
    let passwordValue = document.getElementById("pass").value;
    let message = document.getElementById("msg");
    if (pattern.test(passwordValue)) {
        message.innerText = "Strong Password ✅";
    } else {
        message.innerText = "Weak Password ❌";
    }
}
</script>
</body>
</html>
