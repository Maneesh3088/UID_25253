<!DOCTYPE html>
<html>
<head>
<style>
body {
    text-align: center;
    font-family: Arial;
    background:rgb(0, 191, 255);
    padding-top: 50px;
}
.container {
    display:grid;
    grid-template-columns:1fr;
    gap: 15px;
    width: 250px;
    margin: auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input {
    padding:10px;
    border: 2px solid silver;
    border-radius: 5px;
}
input:hover {
    border-color: #4facfe;
    outline: none;
}
button {
    padding: 10px;
    background:lightgreen;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background:red;
}
</style>
</head>
<body>
<h2 style="color:white;">Sign Checker Statement</h2>
<div class="container">
    <input type="text" id="a" placeholder="Enter A">
    <input type="text" id="b" placeholder="Enter B">
    <input type="text" id="c" placeholder="Enter C">
    <button onclick="check()">Check</button>
</div>
<script>
function check() {
    var a = document.getElementById("a").value;
    var b = document.getElementById("b").value;
    var c = document.getElementById("c").value;
    var p = a * b * c;
    if (p > 0) {
            alert("The sign is plus(+)");
        } else if (p < 0) {
            alert("The sign is minus(-)");
        } else if (p === 0) {
            alert("The product is zero");
        } else {
            alert("Invalid input detected.");
        }
    }
</script>
</body>
</html>
