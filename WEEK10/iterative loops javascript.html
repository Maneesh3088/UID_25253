<!DOCTYPE html>
<html>
<head>
    <title>Sign Checker</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 50px;
    }
    button {
        padding: 10px 20px;
        font-size: 16px;
        background-color:red;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background-color:yellow;
    }
</style>
<body>
    <h2>Iterative Loops Even/Odd</h2>
    <button onclick="check()">Check</button>
<script>
    function check() {
    let n = parseInt(prompt("Enter a number between 0 and 15:"));
    let text = "";
    for (let i = 0; i <= n; i++) {
        if (i % 2 === 0) {
            text += i + " is Even\n";
        } else {
            text += i + " is Odd\n";
        }
    }
    alert(text);
}
</script>
</body>
</html>
