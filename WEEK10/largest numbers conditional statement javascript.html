<!DOCTYPE html>
<html>
<head>
<style>
body {
    text-align: center;
    font-family: Arial;
    background:rgb(0, 191, 255);
    padding-top: 50px;
}
.container {
    display:grid;
    grid-template-columns:1fr;
    gap: 15px;
    width: 250px;
    margin: auto;
    background:white;
    padding:20px;
    border-radius:10px;
}
input {
    padding:10px;
    border: 2px solid silver;
    border-radius: 5px;
}
input:hover {
    border-color: #4facfe;
    outline: none;
}
button {
    padding: 10px;
    background:lightgreen;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover {
    background:red;
}
</style>
</head>
<body>
<h2 style="color:white;">Largest 5 Numbers Checker</h2>
<div class="container">
    <input type="text" id="a" placeholder="Enter A">
    <input type="text" id="b" placeholder="Enter B">
    <input type="text" id="c" placeholder="Enter C">
    <input type="text" id="d" placeholder="Enter D">
    <input type="text" id="e" placeholder="Enter E">
    <button onclick="check()">Check</button>
</div>
<script>
function check() {
    var a = Number(document.getElementById("a").value);
    var b = Number(document.getElementById("b").value);
    var c = Number(document.getElementById("c").value);
    var d = Number(document.getElementById("d").value);
    var e = Number(document.getElementById("e").value);
    var largest = a;
    if (b > largest) largest = b;
    if (c > largest) largest = c;
    if (d > largest) largest = d;
    if (e > largest) largest = e;
    alert("Largest number is: " + largest);
}
</script>
</body>
</html>
